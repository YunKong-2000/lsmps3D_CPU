# Minimal hydrostatic box configuration.
# Format: INI sections with key = value entries. Comments start with '#' or ';'.

[time]
start_time = 0.0
end_time = 1
initial_dt = 0.001
min_dt = 0.000001
max_dt = 0.001
cfl_number = 0.2
growth_factor = 1.05
output_interval = 0.01

[file]
input_directory = ../cases/hydrostatic_box
input_file =
fluid_particle_file = fluid_particles.dat
wall_particle_file = wall_particles.dat
output_directory = output/hydrostatic_box
output_prefix = hydrostatic
write_initial_state = true
write_outputs = true

[geometry]
particle_spacing = 0.05
support_radius = 0.155
domain_min = 0.0 0.0 0.0
domain_max = 1.0 0.75 1.0
fluid_min = 0.0 0.0 0.0
fluid_max = 1.0 0.5 1.0

[physical]
density = 1000.0
viscosity = 0.000001
gravity = 0.0 -9.81 0.0

[free_surface]
neighbor_count_ratio = 0.85
number_density_ratio = 0.90
near_surface_layers = 1
screen_radius_factor = 3.1
wall_patch_radius_factor = 0.85
particle_radius_factor = 0.5
open_threshold = 0.18
cone_angle_degrees = 45.0
cone_threshold = 0.62
min_cone_accessible_ratio = 0.40
cubed_sphere_q = 8
splash_max_fluid_neighbors = 4
splash_open_threshold = 0.75
near_surface_distance_factor = 1.5

[linear_solver]
max_iterations = 1000
tolerance = 0.0000000001
